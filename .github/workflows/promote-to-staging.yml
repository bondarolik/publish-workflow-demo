name: Promote to staging

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to promote
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-staging
  cancel-in-progress: false

jobs:
  promote:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'ready-for-qa' && github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch PR head and squash-merge into staging
        id: promote
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail

          PR_JSON="$(gh pr view "${PR_NUMBER}" --json headRefName,title,number,state)"
          STATE="$(echo "${PR_JSON}" | jq -r '.state')"
          if [[ "${STATE}" != "OPEN" ]]; then
            echo "result=pr_not_open" >> "$GITHUB_OUTPUT"
            echo "PR #${PR_NUMBER} is not open."
            exit 1
          fi

          HEAD_REF="$(echo "${PR_JSON}" | jq -r '.headRefName')"
          PR_TITLE="$(echo "${PR_JSON}" | jq -r '.title')"

          git fetch origin "${HEAD_REF}"
          if git ls-remote --exit-code --heads origin staging; then
            git fetch origin staging
            git checkout staging
          else
            git checkout -b staging origin/main
          fi

          if ! git merge --squash "origin/${HEAD_REF}"; then
            echo "result=merge_conflict" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "result=already_promoted" >> "$GITHUB_OUTPUT"
            echo "Nothing to promote — staging already contains this change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Promote PR #${PR_NUMBER} to staging: ${PR_TITLE}"
          git push origin staging
          echo "result=promoted" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: always() && steps.promote.outputs.result != 'promoted'
        uses: actions/github-script@v7
        env:
          PROMOTE_RESULT: ${{ steps.promote.outputs.result }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const { upsertPrComment } = require('./.github/scripts/upsert-pr-comment.js');

            const pr = Number(process.env.PR_NUMBER);
            const result = process.env.PROMOTE_RESULT || 'unknown';

            let body = null;

            if (result === 'pr_not_open') {
              body = [
                '### Promote to staging — failed',
                '',
                '**Reason:** this PR is not open.',
                '',
                '**Fix:** reopen the PR or promote a different open PR targeting `main`.'
              ].join('\n');
            } else if (result === 'merge_conflict') {
              body = [
                '### Promote to staging — merge conflict',
                '',
                'Could not squash-merge this branch into `staging`.',
                '',
                '**Fix:**',
                '1. Rebase or merge `staging` into this branch',
                '2. Resolve conflicts and push',
                '3. Re-add label `ready-for-qa`'
              ].join('\n');
            } else if (result === 'already_promoted') {
              body = [
                '### Promote to staging — already up to date',
                '',
                '`staging` already contains this change. No new promote commit was created.',
                '',
                '_Staging publish will not re-run unless a new commit lands on `staging`._'
              ].join('\n');
            } else if ('${{ steps.promote.outcome }}' === 'failure') {
              body = [
                '### Promote to staging — failed',
                '',
                'Promotion to `staging` failed. Check the **Promote to staging** workflow logs for details.'
              ].join('\n');
            }

            if (!body) {
              core.info('No promote comment needed.');
              return;
            }

            await upsertPrComment(github, context, core, {
              marker: 'promote-staging',
              body,
              prNumber: pr,
            });

      - name: Fail when promotion failed
        if: steps.promote.outcome == 'failure' && steps.promote.outputs.result != 'already_promoted'
        run: exit 1

      - name: Clear promote error comment
        if: steps.promote.outputs.result == 'promoted'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const { deleteMarkedComment } = require('./.github/scripts/upsert-pr-comment.js');
            await deleteMarkedComment(github, context, core, {
              marker: 'promote-staging',
              prNumber: Number(process.env.PR_NUMBER),
            });

      - name: Summary
        if: steps.promote.outputs.result == 'promoted'
        run: |
          echo "Promoted PR #${{ steps.pr.outputs.number }} to staging."
          echo "publish-staging workflow will log @staging publish on push."
