name: Publish PR pre-release (dry run)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      head_sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number (for manual demo)
        required: true
        type: string
      version_impact:
        description: Version impact override (manual demo)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: publish-pr-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Record PR number
        id: pr
        run: echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"

      - name: Resolve head SHA (manual dispatch)
        id: head
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="$(gh pr view "${{ inputs.pr_number }}" --json headRefOid -q .headRefOid)"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha || steps.head.outputs.sha }}
          fetch-depth: 0

      - name: Write PR body
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = Number('${{ inputs.pr_number }}');
            const { data } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
            });
            fs.writeFileSync('/tmp/pr-body.md', data.body || '');

      - name: Resolve version impact
        id: impact
        env:
          MANUAL_IMPACT: ${{ inputs.version_impact }}
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IMPACT="${MANUAL_IMPACT}"
          else
            if ! IMPACT="$(./scripts/parse-version-impact.sh /tmp/pr-body.md)"; then
              echo "::error::Version impact is missing or invalid in PR body. Check exactly one box under ## Version Impact."
              exit 1
            fi
          fi

          echo "impact=${IMPACT}" >> "$GITHUB_OUTPUT"
          echo "Version impact: ${IMPACT}"

      - name: Compute version and publish (dry run)
        if: steps.impact.outputs.impact != 'none'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          CHANNEL: PR
          DIST_TAG: pr-${{ steps.pr.outputs.number }}
          VERSION_IMPACT: ${{ steps.impact.outputs.impact }}
        run: |
          VERSION="$(./scripts/compute-version.sh pr "${VERSION_IMPACT}" "${PR_NUMBER}" "${GITHUB_RUN_NUMBER}")"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          export VERSION
          ./scripts/publish.sh

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          VERSION: ${{ env.VERSION }}
          VERSION_IMPACT: ${{ steps.impact.outputs.impact }}
        with:
          script: |
            const pr = Number('${{ inputs.pr_number }}');
            const impact = process.env.VERSION_IMPACT;
            const version = process.env.VERSION;

            let body;
            if (impact === 'none') {
              body = [
                '### DRY RUN — PR pre-release skipped',
                '',
                '**Version impact:** `none` (docs / CI / markdown only).',
                '',
                'No pre-release package would be published for this PR.',
                '',
                '_No `ready-for-qa` promotion needed for docs-only changes._'
              ].join('\n');
            } else {
              const tag = `pr-${pr}`;
              body = [
                '### DRY RUN — PR pre-release',
                '',
                `**Version impact:** \`${impact}\``,
                '',
                'No package was published. In production this would publish to CodeArtifact:',
                '',
                `- **Preview version:** \`${version}\``,
                `- **Dist-tag:** \`${tag}\``,
                `- **Would install:** \`pnpm add @lifestance/protos-demo@${tag}\``,
                '',
                '_Add label \`ready-for-qa\` when this change should enter the staging channel._'
              ].join('\n');
            }

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body
            });
