name: Publish PR pre-release (dry run)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number (for manual demo)
        required: true
        type: string
      version_impact:
        description: Version impact override (manual demo)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: publish-pr-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR metadata
        id: pr
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Resolve version impact
        id: impact
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          MANUAL_IMPACT: ${{ inputs.version_impact }}
        run: |
          chmod +x scripts/*.sh

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IMPACT="${MANUAL_IMPACT}"
          else
            printf '%s' "${PR_BODY}" > /tmp/pr-body.md
            IMPACT="$(./scripts/parse-version-impact.sh /tmp/pr-body.md)"
          fi

          echo "impact=${IMPACT}" >> "$GITHUB_OUTPUT"
          echo "Version impact: ${IMPACT}"

      - name: Compute version and publish (dry run)
        if: steps.impact.outputs.impact != 'none'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          CHANNEL: PR
          DIST_TAG: pr-${{ steps.pr.outputs.number }}
          VERSION_IMPACT: ${{ steps.impact.outputs.impact }}
        run: |
          VERSION="$(./scripts/compute-version.sh pr "${VERSION_IMPACT}" "${PR_NUMBER}" "${GITHUB_RUN_NUMBER}")"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          export VERSION
          ./scripts/publish.sh

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          VERSION: ${{ env.VERSION }}
          VERSION_IMPACT: ${{ steps.impact.outputs.impact }}
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const impact = process.env.VERSION_IMPACT;
            const version = process.env.VERSION;

            let body;
            if (impact === 'none') {
              body = [
                '### DRY RUN — PR pre-release skipped',
                '',
                '**Version impact:** `none` (docs / CI / markdown only).',
                '',
                'No pre-release package would be published for this PR.',
                '',
                '_No `ready-for-qa` promotion needed for docs-only changes._'
              ].join('\n');
            } else {
              const tag = `pr-${pr}`;
              body = [
                '### DRY RUN — PR pre-release',
                '',
                `**Version impact:** \`${impact}\``,
                '',
                'No package was published. In production this would publish to CodeArtifact:',
                '',
                `- **Preview version:** \`${version}\``,
                `- **Dist-tag:** \`${tag}\``,
                `- **Would install:** \`pnpm add @lifestance/protos-demo@${tag}\``,
                '',
                '_Add label \`ready-for-qa\` when this change should enter the staging channel._'
              ].join('\n');
            }

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body
            });
