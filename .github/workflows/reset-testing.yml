name: Reset testing from main

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset testing to main
        run: |
          set -euo pipefail
          git fetch origin main
          if git ls-remote --exit-code --heads origin testing; then
            git checkout testing
            git reset --hard origin/main
          else
            git checkout -B testing origin/main
          fi
          git push origin testing --force-with-lease
          echo "testing now matches main."
