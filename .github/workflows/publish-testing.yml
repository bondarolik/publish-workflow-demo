name: Publish testing (dry run)

on:
  push:
    branches: [testing]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: publish-testing
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and publish (dry run)
        id: publish
        env:
          CHANNEL: TESTING
          DIST_TAG: testing
        run: |
          chmod +x scripts/*.sh
          VERSION="$(./scripts/compute-version.sh testing "${GITHUB_RUN_NUMBER}")"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          export VERSION
          # DRY RUN — DevOps: replace ./scripts/publish.sh with CodeArtifact publish
          # (e.g. ./scripts/publish-codeartifact.sh) in cm_protos production.
          ./scripts/publish.sh

      - name: Resolve promoted PR from commit message
        id: promoted_pr
        run: |
          MSG="$(git log -1 --format=%s "${GITHUB_SHA}")"
          if [[ "${MSG}" =~ Promote\ PR\ #([0-9]+) ]]; then
            echo "number=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "Promoted PR #${BASH_REMATCH[1]}"
          else
            echo "No promoted PR in commit message — skipping PR comment."
          fi

      - name: Comment on promoted PR
        if: steps.promoted_pr.outputs.number != ''
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.publish.outputs.version }}
          PR_NUMBER: ${{ steps.promoted_pr.outputs.number }}
        with:
          script: |
            const { upsertPrComment } = require('./.github/scripts/upsert-pr-comment.js');

            const pr = Number(process.env.PR_NUMBER);
            const version = process.env.VERSION;

            const body = [
              '### DRY RUN — Testing publish',
              '',
              'This PR was promoted to `testing`. No package was published. In production this would publish to CodeArtifact:',
              '',
              `- **Version:** \`${version}\``,
              `- **Dist-tag:** \`testing\``,
              `- **Would install:** \`pnpm add @lifestance/protos-demo@testing\``,
              '',
              '_After QA passes, squash-merge this PR to `main` for a stable release._'
            ].join('\n');

            await upsertPrComment(github, context, core, {
              marker: 'publish-testing',
              body,
              prNumber: pr,
            });
