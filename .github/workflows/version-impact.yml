name: version-impact

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: version-impact-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write PR body
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('/tmp/pr-body.md', context.payload.pull_request.body || '');

      - name: Validate version impact
        env:
          LABELS_CSV: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/validate-version-impact.sh \
            --body /tmp/pr-body.md \
            --labels "${LABELS_CSV}" \
            --base-ref "origin/${{ github.event.pull_request.base.ref }}" \
            --head-ref HEAD
